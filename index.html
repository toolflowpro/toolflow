.tf-section-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

.tf-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

}

function saveSession(u){sessionStorage.setItem("tf_user",JSON.stringify(u));}
function loadSession(){try{return JSON.parse(sessionStorage.getItem("tf_user"));}catch{return null;}}
function clearSession(){sessionStorage.removeItem("tf_user");}

// DB helpers
async function fetchReports(){const{data}=await sb.from("tool_reports").select("*").order("created_at",{ascending:false});return data||[];}
async function insertReport(r){const{error}=await sb.from("tool_reports").insert([r]);return!error;}
async function fetchMachinesDB(){const{data}=await sb.from("machines").select("*").order("name");return data||null;}
async function saveMachinesDB(m){await sb.from("machines").delete().neq("id","__none__");const{error}=await sb.from("machines").insert(m);return!error;}
async function fetchInventory(){const{data}=await sb.from("tool_inventory").select("*").order("tool_id");return data||[];}
async function upsertInventoryItem(item){
  if(item.id){const{error}=await sb.from("tool_inventory").update({...item,updated_at:new Date().toISOString()}).eq("id",item.id);return!error;}
  const{error}=await sb.from("tool_inventory").insert([item]);return!error;
}
async function deleteInventoryItem(id){const{error}=await sb.from("tool_inventory").delete().eq("id",id);return!error;}

// helpers
function getStockStatus(item){
  if(item.quantity<=0)return"critical";
  if(item.quantity<=item.min_quantity)return"lowstock";
  return"ok";
}
function getSlotStockStatus(toolId,inventory){
  if(!toolId)return null;
  const item=inventory.find(i=>i.tool_id===toolId);
  if(!item)return null;
  return getStockStatus(item);
}

function ReasonBadge({reason}){
  if(reason==="broken")return<span className="tf-badge red">BROKEN</span>;
  if(reason==="worn")return<span className="tf-badge warn">WORN</span>;
  if(reason==="lost")return<span className="tf-badge orange">LOST</span>;
  if(reason==="return")return<span className="tf-badge green">RETURNED</span>;
  return null;
}

// ── LOGIN ────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const[name,setName]=useState("");const[badge,setBadge]=useState("");const[error,setError]=useState("");
  const submit=()=>{
    const n=name.trim(),b=badge.trim();
    if(!n){setError("Please enter your name.");return;}
    if(!b||!/^\d+$/.test(b)){setError("Badge number must be numeric.");return;}
    const u={name:n,badge:b,isAdmin:b===ADMIN_BADGE};saveSession(u);onLogin(u);
  };
  return(
    <div className="tf-login-wrap">
      <div className="tf-login-box">
        <div className="tf-login-logo">TOOL<span>FLOW</span></div>
        <div className="tf-login-sub">Shop Floor Tool Management</div>
        <div className="tf-login-card">
          <div className="tf-login-title">Sign In</div>
          {error&&<div className="tf-error">{error}</div>}
          <div className="tf-form-group"><label className="tf-form-label">Full Name</label>
            <input className="tf-input" placeholder="e.g. John Martinez" value={name} onChange={e=>{setName(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&submit()} /></div>
          <div className="tf-form-group"><label className="tf-form-label">Badge Number</label>
            <input className="tf-input" type="tel" placeholder="e.g. 1042" value={badge} onChange={e=>{setBadge(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&submit()} /></div>
          <button className="tf-btn primary full" style={{marginTop:8}} onClick={submit} disabled={!name.trim()||!badge.trim()}>Enter Shop Floor</button>
        </div>
      </div>
    </div>
  );
}

// ── OPERATOR VIEW ────────────────────────────────────────────────────────────
function OperatorView({user,machines,onReportAdded,inventory}){
  const[step,setStep]=useState(1);const[action,setAction]=useState("");const[saving,setSaving]=useState(false);
  const emptyForm={toolId:"",toolType:"",machine:"",notes:"",turret:"",position:""};
  const[form,setForm]=useState(emptyForm);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const activeMachines=machines.filter(m=>m.active);
  const selMachine=machines.find(m=>m.id===form.machine);
  const isLathe=selMachine?.type==="lathe";
  const lowStockItems=inventory.filter(i=>getStockStatus(i)!=="ok");

  const submit=async()=>{
    setSaving(true);
    const inv=inventory.find(i=>i.tool_id===form.toolId);
    const ok=await insertReport({
      tool_id:form.toolId,tool_type:form.toolType||null,
      machine_id:form.machine,machine_name:selMachine?.name||form.machine,
      machine_model:selMachine?.model||null,reason:action,notes:form.notes||null,
      operator_name:user.name,operator_badge:user.badge,
      turret:form.turret||null,position:form.position||null,
      cost:inv?.unit_price||(action==="broken"?45:action==="worn"?20:action==="lost"?35:0),
    });
    setSaving(false);
    if(ok){onReportAdded();setStep(3);}else alert("Error saving.");
  };
  const reset=()=>{setStep(1);setAction("");setForm(emptyForm);};

  if(step===3)return(
    <div className="tf-card"><div className="tf-success-screen">
      <div className="tf-success-icon">✓</div>
      <div className="tf-success-title">REPORT SUBMITTED</div>
      <div className="tf-success-sub">Tool Crib notified · Saved to database</div>
      <div style={{marginTop:28,display:"flex",gap:12,justifyContent:"center"}}>
        <button className="tf-btn ghost" onClick={reset}>New Report</button>
        <button className="tf-btn primary" onClick={reset}>Done</button>
      </div>
    </div></div>
  );

  if(step===1)return(
    <div>
      <div className="tf-section-header">
        <div className="tf-section-title">QUICK <span>REPORT</span></div>
        <div className="tf-section-sub">What happened to the tool?</div>
      </div>
      {lowStockItems.length>0&&(
        <div className="tf-alert-banner warn">
          ⚠ {lowStockItems.filter(i=>getStockStatus(i)==="critical").length > 0
            ? `🔴 ${lowStockItems.filter(i=>getStockStatus(i)==="critical").length} tool(s) OUT OF STOCK · `
            : ""}
          {lowStockItems.filter(i=>getStockStatus(i)==="lowstock").length} tool(s) LOW STOCK — notify Tool Attendant
        </div>
      )}
      <div className="tf-grid2" style={{gap:12}}>
        {[
          {key:"broken",icon:"💥",label:"Broken",sub:"Tool broke, needs replacement",color:"var(--danger)"},
          {key:"worn",icon:"🔧",label:"Worn Out",sub:"Reached end of tool life",color:"var(--warn)"},
          {key:"lost",icon:"🔍",label:"Can't Find It",sub:"Lost tool, search required",color:"var(--accent2)"},
          {key:"return",icon:"↩️",label:"Return to Crib",sub:"Return tool to inventory",color:"var(--accent3)"},
        ].map(a=>(
          <div key={a.key} className="tf-card" style={{cursor:"pointer",borderColor:"transparent",transition:"border-color 0.2s"}}
            onClick={()=>{setAction(a.key);setStep(2);}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=a.color}
            onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}>
            <div style={{fontSize:28,marginBottom:8}}>{a.icon}</div>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:16,fontWeight:700,marginBottom:3,color:a.color}}>{a.label}</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>{a.sub}</div>
          </div>
        ))}
      </div>
    </div>
  );

  const labels={broken:"Broken Tool 💥",worn:"Worn Tool 🔧",lost:"Lost Tool 🔍",return:"Return Tool ↩️"};
  const selectedInv=inventory.find(i=>i.tool_id===form.toolId);
  const stockStatus=selectedInv?getStockStatus(selectedInv):null;

  return(
    <div>
      <div className="tf-section-header" style={{display:"flex",alignItems:"center",gap:12}}>
        <button className="tf-btn ghost sm" onClick={()=>setStep(1)}>← Back</button>
        <div><div className="tf-section-title"><span>{labels[action]}</span></div><div className="tf-section-sub">Fill in the details</div></div>
      </div>
      <div className="tf-card">
        <div className="tf-grid2">
          <div className="tf-form-group"><label className="tf-form-label">Tool ID / Number</label>
            <input className="tf-input" placeholder="e.g. EM-0.500-4FL" value={form.toolId} onChange={set("toolId")} /></div>
          <div className="tf-form-group"><label className="tf-form-label">Tool Type</label>
            <select className="tf-select" value={form.toolType} onChange={set("toolType")}>
              <option value="">Select…</option>{TOOL_TYPES.map(t=><option key={t}>{t}</option>)}
            </select></div>
        </div>
        {stockStatus==="critical"&&<div className="tf-alert-banner danger">🔴 This tool is OUT OF STOCK — notify Tool Attendant immediately</div>}
        {stockStatus==="lowstock"&&<div className="tf-alert-banner warn">⚠ This tool is LOW STOCK ({selectedInv.quantity} remaining) — notify Tool Attendant</div>}
        <div className="tf-form-group"><label className="tf-form-label">Machine</label>
          <select className="tf-select" value={form.machine} onChange={set("machine")}>
            <option value="">Select machine…</option>
            {MODEL_ORDER.map(model=>{const g=activeMachines.filter(m=>m.model===model);if(!g.length)return null;
              return<optgroup key={model} label={"— "+model+" —"}>{g.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</optgroup>;})}
          </select></div>
        {isLathe&&(action==="broken"||action==="worn")&&(
          <div className="tf-grid2">
            <div className="tf-form-group"><label className="tf-form-label">Turret</label>
              <select className="tf-select" value={form.turret} onChange={set("turret")}>
                <option value="">Select…</option>{Array.from({length:selMachine.turrets},(_,i)=><option key={i}>T{i+1}</option>)}
              </select></div>
            <div className="tf-form-group"><label className="tf-form-label">Position</label>
              <select className="tf-select" value={form.position} onChange={set("position")}>
                <option value="">Select…</option>{Array.from({length:selMachine.positions},(_,i)=><option key={i}>{i+1}</option>)}
              </select></div>
          </div>
        )}
        <div className="tf-form-group"><label className="tf-form-label">Notes (optional)</label>
          <textarea className="tf-textarea" placeholder="Briefly describe what happened…" value={form.notes} onChange={set("notes")} /></div>
        {selectedInv&&<div style={{fontSize:12,color:"var(--muted)",marginBottom:12}}>Tool cost: <span style={{color:"var(--accent)",fontFamily:"'Share Tech Mono'"}}>${selectedInv.unit_price.toFixed(2)}</span></div>}
        <button className="tf-btn primary full" onClick={submit} disabled={!form.toolId.trim()||!form.machine||saving}>{saving?"Saving…":"Submit Report"}</button>
      </div>
    </div>
  );
}

// ── CRIB VIEW ────────────────────────────────────────────────────────────────
function CribView({reports,loading,onRefresh,inventory}){
  const[search,setSearch]=useState("");const[filter,setFilter]=useState("all");
  const filtered=reports.filter(r=>{
    const q=search.toLowerCase();
    return((r.tool_id||"").toLowerCase().includes(q)||(r.machine_name||"").toLowerCase().includes(q)||(r.operator_name||"").toLowerCase().includes(q)||(r.operator_badge||"").includes(q))
      &&(filter==="all"||r.reason===filter);
  });
  const totalCost=reports.reduce((s,r)=>s+(r.cost||0),0);
  const today=new Date().toDateString();
  const todayR=reports.filter(r=>r.created_at&&new Date(r.created_at).toDateString()===today);
  const todayCost=todayR.reduce((s,r)=>s+(r.cost||0),0);
  const criticalItems=inventory.filter(i=>getStockStatus(i)==="critical");
  const lowItems=inventory.filter(i=>getStockStatus(i)==="lowstock");

  return(
    <div>
      <div className="tf-section-header" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>

        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Share Tech Mono'",fontSize:10,color:"var(--muted)",letterSpacing:2}}>TODAY'S LOSS</div>
            <div style={{fontFamily:"'Share Tech Mono'",fontSize:22,color:"var(--danger)"}}>${todayCost.toFixed(2)}</div>
          </div>
          <button className="tf-btn ghost sm" onClick={onRefresh}>↻ Refresh</button>
        </div>
      </div>
      {criticalItems.length>0&&<div className="tf-alert-banner danger">🔴 OUT OF STOCK: {criticalItems.map(i=>i.tool_id).join(", ")} — ORDER IMMEDIATELY</div>}
      {lowItems.length>0&&<div className="tf-alert-banner warn">⚠ LOW STOCK: {lowItems.map(i=>`${i.tool_id} (${i.quantity} left)`).join(", ")}</div>}
      <div className="tf-grid4" style={{marginBottom:16}}>
        <div className="tf-stat-card danger"><div className="tf-stat-label">Total Loss</div><div className="tf-stat-value danger">${totalCost.toFixed(0)}</div><div className="tf-stat-sub">all time</div></div>
        <div className="tf-stat-card orange"><div className="tf-stat-label">Today</div><div className="tf-stat-value orange">{todayR.length}</div><div className="tf-stat-sub">reports</div></div>
        <div className="tf-stat-card warn"><div className="tf-stat-label">Broken</div><div className="tf-stat-value warn">{reports.filter(r=>r.reason==="broken").length}</div><div className="tf-stat-sub">total</div></div>
        <div className="tf-stat-card cyan"><div className="tf-stat-label">Lost</div><div className="tf-stat-value cyan">{reports.filter(r=>r.reason==="lost").length}</div><div className="tf-stat-sub">tools</div></div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {[{k:"all",l:"All"},{k:"broken",l:"Broken"},{k:"worn",l:"Worn"},{k:"lost",l:"Lost"},{k:"return",l:"Returned"}].map(f=>(
          <button key={f.k} className={"tf-btn sm "+(filter===f.k?"primary":"ghost")} onClick={()=>setFilter(f.k)}>{f.l}</button>
        ))}
      </div>
      <div className="tf-search-bar">
        <span style={{color:"var(--muted)"}}>🔎</span>
        <input placeholder="Search tool, machine, operator, badge…" value={search} onChange={e=>setSearch(e.target.value)} />
      </div>
      {loading?<div className="tf-loading">Loading…</div>:(
        <div className="tf-card" style={{padding:0,overflow:"hidden"}}>
          <div className="tf-table-wrap">

              <thead><tr><th>Tool ID</th><th>Type</th><th>Status</th><th>Machine</th><th>Operator</th><th>Badge</th><th>Cost</th><th>Date/Time</th></tr></thead>

                    <td className="tf-mono" style={{color:"var(--muted)"}}>{r.operator_badge}</td>

// ── INVENTORY VIEW ───────────────────────────────────────────────────────────
function InventoryView({inventory,onRefresh,user}){
  const[search,setSearch]=useState("");
  const[editItem,setEditItem]=useState(null);
  const[saving,setSaving]=useState(false);
  const[saved,setSaved]=useState("");
  const[showAdd,setShowAdd]=useState(false);
  const emptyNew={tool_id:"",tool_type:"",description:"",quantity:0,min_quantity:2,unit_price:0};
  const[newItem,setNewItem]=useState(emptyNew);

  const filtered=inventory.filter(i=>
    i.tool_id.toLowerCase().includes(search.toLowerCase())||
    (i.tool_type||"").toLowerCase().includes(search.toLowerCase())||
    (i.description||"").toLowerCase().includes(search.toLowerCase())
  );

  const criticalCount=inventory.filter(i=>getStockStatus(i)==="critical").length;
  const lowCount=inventory.filter(i=>getStockStatus(i)==="lowstock").length;
  const totalValue=inventory.reduce((s,i)=>s+(i.quantity*i.unit_price),0);

  const handleSave=async(item)=>{
    setSaving(true);

            <div className="tf-form-group"><label className="tf-form-label">Tool Type</label>

            <div className="tf-form-group"><label className="tf-form-label">Description</label>

                    {status==="ok"&&<span className="tf-badge green">IN STOCK</span>}
                  </div>
                  {item.description&&<div style={{fontSize:12,color:"var(--muted)",marginBottom:6}}>{item.description}</div>}
                  <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                    <div className={"tf-qty-badge "+status}>{item.quantity} in stock</div>
                    <div style={{fontSize:11,color:"var(--muted)"}}>Min: {item.min_quantity}</div>
                    <div style={{fontSize:11,color:"var(--accent2)",fontFamily:"'Share Tech Mono'"}}>
                      ${item.unit_price.toFixed(2)}/ea · Value: ${(item.quantity*item.unit_price).toFixed(2)}
                    </div>
                  </div>
                </div>
                {user.isAdmin&&(
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <button className="tf-btn ghost sm" onClick={()=>setEditItem(isEditing?null:{...item})}>✏️</button>
                    <button className="tf-btn danger sm" onClick={()=>handleDelete(item.id)}>✕</button>
                  </div>
                )}
              </div>
              {isEditing&&(
                <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid var(--border)"}}>
                  <div className="tf-grid2">
                    <div className="tf-form-group"><label className="tf-form-label">Unit Price ($)</label>
                      <input className="tf-input" type="number" min="0" step="0.01" value={editItem.unit_price} onChange={e=>setEditItem(p=>({...p,unit_price:parseFloat(e.target.value)||0}))} /></div>
                    <div className="tf-form-group"><label className="tf-form-label">Current Quantity</label>
                      <input className="tf-input" type="number" min="0" value={editItem.quantity} onChange={e=>setEditItem(p=>({...p,quantity:parseInt(e.target.value)||0}))} /></div>
                    <div className="tf-form-group"><label className="tf-form-label">Min Quantity</label>
                      <input className="tf-input" type="number" min="1" value={editItem.min_quantity} onChange={e=>setEditItem(p=>({...p,min_quantity:parseInt(e.target.value)||1}))} /></div>
                    <div className="tf-form-group"><label className="tf-form-label">Description</label>
                      <input className="tf-input" value={editItem.description||""} onChange={e=>setEditItem(p=>({...p,description:e.target.value}))} /></div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button className="tf-btn ghost sm" onClick={()=>setEditItem(null)}>Cancel</button>
                    <button className="tf-btn primary sm" onClick={()=>handleSave(editItem)} disabled={saving}>{saving?"Saving…":"Save Changes"}</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── SLOT MODAL ───────────────────────────────────────────────────────────────
function SlotModal({slot,machine,onClose,onSave,inventory}){
  const[toolId,setToolId]=useState(slot.tool||"");
  const[status,setStatus]=useState(slot.status||"empty");
  const inv=inventory.find(i=>i.tool_id===toolId);
  const stockStatus=inv?getStockStatus(inv):null;
  return(
    <div className="tf-modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="tf-modal">
        <div className="tf-modal-title">{machine.name} · {slot.turret!==undefined?`T${slot.turret+1} · `:""}Pos {slot.pos!==undefined?slot.pos+1:slot.pocket+1}</div>
        {stockStatus==="critical"&&<div className="tf-alert-banner danger">🔴 This tool is OUT OF STOCK</div>}
        {stockStatus==="lowstock"&&<div className="tf-alert-banner warn">⚠ Low Stock — {inv.quantity} remaining</div>}
        <div className="tf-form-group"><label className="tf-form-label">Tool ID</label>
          <input className="tf-input" placeholder="e.g. EM-0.500-4FL" value={toolId} onChange={e=>setToolId(e.target.value)} /></div>
        {inv&&<div style={{fontSize:12,color:"var(--muted)",marginBottom:12}}>
          {inv.tool_type} · ${inv.unit_price.toFixed(2)}/ea · {inv.quantity} in crib
        </div>}
        <div className="tf-form-group"><label className="tf-form-label">Status</label>
          <select className="tf-select" value={status} onChange={e=>setStatus(e.target.value)}>
            <option value="empty">Empty</option>
            <option value="occupied">In Use</option>
            <option value="worn">Worn</option>
            <option value="broken">Broken</option>
          </select></div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button className="tf-btn ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
          <button className="tf-btn primary" style={{flex:1}} onClick={()=>onSave(toolId,status)}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ── MACHINE VIEW ─────────────────────────────────────────────────────────────
function MachineView({machines,inventory}){
  const[selected,setSelected]=useState(null);
  const[slots,setSlots]=useState({});
  const[editingSlot,setEditingSlot]=useState(null);
  const detailRef=useRef(null);
  const activeMachines=machines.filter(m=>m.active);
  const selMachine=machines.find(m=>m.id===selected);

  const handleSelect=(id)=>{
    if(id===selected){setSelected(null);return;}
    setSelected(id);
    setTimeout(()=>detailRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),150);
  };

  const getSlotKey=(machineId,turret,pos)=>`${machineId}-${turret}-${pos}`;
  const getSlot=(machineId,turret,pos)=>slots[getSlotKey(machineId,turret,pos)]||{tool:"",status:"empty"};
  const saveSlot=(machineId,turret,pos,toolId,status)=>{
    setSlots(prev=>({...prev,[getSlotKey(machineId,turret,pos)]:{tool:toolId,status}}));
    setEditingSlot(null);
  };

  const getSlotClass=(slot,toolId)=>{
    const stockStatus=getSlotStockStatus(toolId,inventory);
    if(stockStatus==="critical")return"critical";
    if(stockStatus==="lowstock")return"lowstock";
    return slot.status||"empty";
  };

  return(
    <div>
      <div className="tf-section-header">
        <div className="tf-section-title">MACHINE <span>INVENTORY</span></div>
        <div className="tf-section-sub">Tap a machine · colored slots = stock alerts</div>
      </div>
      <div className="tf-grid4" style={{marginBottom:16}}>
        <div className="tf-stat-card cyan"><div className="tf-stat-label">Active</div><div className="tf-stat-value cyan">{activeMachines.length}</div><div className="tf-stat-sub">online</div></div>
        <div className="tf-stat-card orange"><div className="tf-stat-label">Offline</div><div className="tf-stat-value orange">{machines.filter(m=>!m.active).length}</div><div className="tf-stat-sub">disabled</div></div>
        <div className="tf-stat-card green"><div className="tf-stat-label">Lathes</div><div className="tf-stat-value green">{activeMachines.filter(m=>m.type==="lathe").length}</div><div className="tf-stat-sub">turrets</div></div>
        <div className="tf-stat-card warn"><div className="tf-stat-label">Mills</div><div className="tf-stat-value warn">{activeMachines.filter(m=>m.type==="mill").length}</div><div className="tf-stat-sub">Haas+XL</div></div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",fontSize:11,color:"var(--muted)"}}>
        <span style={{color:"var(--accent)"}}>● IN USE</span>
        <span style={{color:"var(--warn)"}}>● WORN</span>
        <span style={{color:"var(--danger)"}}>● BROKEN / OUT OF STOCK</span>
        <span style={{color:"var(--accent2)"}}>● LOW STOCK ⚠</span>
        <span>○ EMPTY</span>
      </div>

      {MODEL_ORDER.map(model=>{
        const group=machines.filter(m=>m.model===model);if(!group.length)return null;
        return(
          <div key={model} style={{marginBottom:16}}>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:12,fontWeight:700,letterSpacing:2,color:"var(--muted)",textTransform:"uppercase",marginBottom:8,borderBottom:"1px solid var(--border)",paddingBottom:6}}>{model}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>
              {group.map(m=>(
                <div key={m.id} className={"tf-machine-card"+(m.id===selected?" selected":"")+(m.active?"":" offline")} onClick={()=>m.active&&handleSelect(m.id)}>
                  <div className="tf-machine-name">{m.name}</div>
                  <div className="tf-machine-type">{m.type==="lathe"?`${m.turrets}T·${m.positions}pos`:`${m.pockets}pockets`}</div>
                  {!m.active&&<span className="tf-badge muted" style={{marginTop:4,display:"inline-block",fontSize:9}}>OFFLINE</span>}
                </div>
              ))}
            </div>
          </div>
        );
      })}

      {selMachine&&(
        <div ref={detailRef} className="tf-card" style={{marginTop:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:18,fontWeight:700,letterSpacing:2,color:"var(--accent)"}}>{selMachine.name}</div>
            <button className="tf-btn ghost sm" onClick={()=>setSelected(null)}>✕ Close</button>
          </div>
          <div style={{fontSize:11,color:"var(--muted)",marginBottom:12}}>Tap any slot to assign or update a tool · Orange/Red = stock alert</div>
          {selMachine.type==="lathe"?(
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {Array.from({length:selMachine.turrets},(_,ti)=>(
                <div key={ti} className="tf-turret-block">
                  <div className="tf-turret-label">TURRET T{ti+1}</div>
                  <div className="tf-turret-grid">
                    {Array.from({length:selMachine.positions},(_,pi)=>{
                      const s=getSlot(selMachine.id,ti,pi);
                      const cls=getSlotClass(s,s.tool);
                      return(
                        <div key={pi} className={"tf-slot "+cls} onClick={()=>setEditingSlot({turret:ti,pos:pi,...s})}>
                          <span className="tf-slot-num">P{pi+1}</span>
                          <span className="tf-slot-tool">{s.tool||"—"}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          ):(
            <div>
              <div style={{marginBottom:10,fontSize:12,color:"var(--muted)"}}>{selMachine.pockets} Tool Pockets</div>
              <div className="tf-pocket-grid">
                {Array.from({length:selMachine.pockets},(_,i)=>{
                  const s=getSlot(selMachine.id,"pocket",i);
                  const stockSt=getSlotStockStatus(s.tool,inventory);
                  const cls=stockSt==="critical"?"critical":stockSt==="lowstock"?"lowstock":s.tool?"occupied":"";
                  return(
                    <div key={i} className={"tf-pocket "+cls} title={`P${i+1}${s.tool?" — "+s.tool:""}`}
                      onClick={()=>setEditingSlot({pocket:i,...s})}>
                      {i+1}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {editingSlot&&selMachine&&(
        <SlotModal slot={editingSlot} machine={selMachine} inventory={inventory} onClose={()=>setEditingSlot(null)}
          onSave={(toolId,status)=>{
            if(editingSlot.turret!==undefined)saveSlot(selMachine.id,editingSlot.turret,editingSlot.pos,toolId,status);
            else saveSlot(selMachine.id,"pocket",editingSlot.pocket,toolId,status);
          }} />
      )}
    </div>
  );
}

// ── ANALYTICS VIEW ───────────────────────────────────────────────────────────
function AnalyticsView({reports,inventory}){
  const totalCost=reports.reduce((s,r)=>s+(r.cost||0),0);
  const byReason={broken:0,worn:0,lost:0,return:0};
  reports.forEach(r=>{if(byReason[r.reason]!==undefined)byReason[r.reason]++;});
  const byMachine={};
  reports.forEach(r=>{if(!r.machine_name)return;if(!byMachine[r.machine_name])byMachine[r.machine_name]={count:0,cost:0};byMachine[r.machine_name].count++;byMachine[r.machine_name].cost+=(r.cost||0);});
  const topM=Object.entries(byMachine).sort((a,b)=>b[1].cost-a[1].cost).slice(0,8);
  const maxM=topM.length?topM[0][1].cost:1;
  const byType={};
  reports.forEach(r=>{if(!r.tool_type)return;if(!byType[r.tool_type])byType[r.tool_type]={count:0,cost:0};byType[r.tool_type].count++;byType[r.tool_type].cost+=(r.cost||0);});
  const topT=Object.entries(byType).sort((a,b)=>b[1].cost-a[1].cost).slice(0,8);
  const maxT=topT.length?topT[0][1].cost:1;
  const inventoryValue=inventory.reduce((s,i)=>s+(i.quantity*i.unit_price),0);
  const byOperator={};
  reports.forEach(r=>{if(!r.operator_name)return;if(!byOperator[r.operator_name])byOperator[r.operator_name]={count:0,cost:0};byOperator[r.operator_name].count++;byOperator[r.operator_name].cost+=(r.cost||0);});
  const topOp=Object.entries(byOperator).sort((a,b)=>b[1].cost-a[1].cost).slice(0,5);

  return(
    <div>
      <div className="tf-section-header"><div className="tf-section-title">ANALYTICS <span>&amp; COSTS</span></div><div className="tf-section-sub">Real cost data from all reports</div></div>
      <div className="tf-grid4" style={{marginBottom:16}}>
        <div className="tf-stat-card danger"><div className="tf-stat-label">Total Tool Loss</div><div className="tf-stat-value danger">${totalCost.toFixed(0)}</div><div className="tf-stat-sub">all time</div></div>
        <div className="tf-stat-card orange"><div className="tf-stat-label">Broken</div><div className="tf-stat-value orange">{byReason.broken}</div><div className="tf-stat-sub">reported</div></div>
        <div className="tf-stat-card warn"><div className="tf-stat-label">Lost</div><div className="tf-stat-value warn">{byReason.lost}</div><div className="tf-stat-sub">unaccounted</div></div>
        <div className="tf-stat-card green"><div className="tf-stat-label">Inventory Value</div><div className="tf-stat-value green" style={{fontSize:20}}>${inventoryValue.toFixed(0)}</div><div className="tf-stat-sub">in crib</div></div>
      </div>
      <div className="tf-grid2" style={{marginBottom:12}}>
        <div className="tf-card">
          <div className="tf-card-title">Top Machines by Cost</div>
          {topM.length===0&&<div style={{color:"var(--muted)",fontSize:12}}>No data yet</div>}
          {topM.map(([name,d])=>(
            <div key={name} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span className="tf-mono" style={{fontSize:11,color:"var(--accent)"}}>{name}</span>
                <span className="tf-mono" style={{fontSize:11,color:"var(--danger)"}}>${d.cost.toFixed(0)}</span>
              </div>
              <div className="tf-progress-bar"><div className="tf-progress-fill" style={{width:`${(d.cost/maxM)*100}%`,background:"var(--accent2)"}} /></div>
            </div>
          ))}
        </div>
        <div className="tf-card">
          <div className="tf-card-title">Loss by Tool Type</div>
          {topT.length===0&&<div style={{color:"var(--muted)",fontSize:12}}>No data yet</div>}
          {topT.map(([type,d])=>(
            <div key={type} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:11}}>{type}</span>
                <span className="tf-mono" style={{fontSize:11,color:"var(--danger)"}}>${d.cost.toFixed(0)} ({d.count})</span>
              </div>
              <div className="tf-progress-bar"><div className="tf-progress-fill" style={{width:`${(d.cost/maxT)*100}%`,background:"var(--accent)"}} /></div>
            </div>
          ))}
        </div>
      </div>
      {topOp.length>0&&(
        <div className="tf-card">
          <div className="tf-card-title">Top Operators by Reports</div>
          <div className="tf-table-wrap">
            <table className="tf-table">
              <thead><tr><th>Operator</th><th>Reports</th><th>Total Cost</th><th>Avg Cost</th></tr></thead>
              <tbody>
                {topOp.map(([name,d])=>(
                  <tr key={name}>
                    <td>{name}</td>
                    <td className="tf-mono" style={{color:"var(--accent)"}}>{d.count}</td>
                    <td className="tf-mono" style={{color:"var(--danger)"}}>${d.cost.toFixed(2)}</td>
                    <td className="tf-mono" style={{color:"var(--muted)"}}>${(d.cost/d.count).toFixed(2)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ADMIN VIEW ───────────────────────────────────────────────────────────────
function AdminView({machines,setMachines,onSave}){
  const[saving,setSaving]=useState(false);const[saved,setSaved]=useState(false);const[editId,setEditId]=useState(null);
  const nm={name:"",model:"",type:"lathe",turrets:3,positions:12,pockets:40,active:true};
  const[newM,setNewM]=useState(nm);
  const toggle=id=>setMachines(p=>p.map(m=>m.id===id?{...m,active:!m.active}:m));
  const rename=(id,name)=>setMachines(p=>p.map(m=>m.id===id?{...m,name}:m));
  const remove=id=>{if(confirm("Remove this machine?"))setMachines(p=>p.filter(m=>m.id!==id));};
  const add=()=>{if(!newM.name.trim())return;const id=newM.name.toLowerCase().replace(/\s+/g,"-")+"-"+Date.now();setMachines(p=>[...p,{...newM,id}]);setNewM(nm);};
  const save=async()=>{setSaving(true);const ok=await onSave(machines);setSaving(false);if(ok){setSaved(true);setTimeout(()=>setSaved(false),3000);}else alert("Error.");};
  return(
    <div>
      <div className="tf-section-header" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
        <div><div className="tf-section-title">ADMIN <span>PANEL</span></div><div className="tf-section-sub">Badge 2026 required</div></div>
        <button className="tf-btn primary sm" onClick={save} disabled={saving}>{saving?"Saving…":"💾 Save"}</button>
      </div>
      {saved&&<div className="tf-success-msg">✓ Saved to database</div>}
      <div className="tf-card" style={{marginBottom:16}}>
        <div className="tf-card-title">Add New Machine</div>
        <div className="tf-grid2">
          <div className="tf-form-group"><label className="tf-form-label">Machine Name</label>
            <input className="tf-input" placeholder="e.g. Haas VF-9" value={newM.name} onChange={e=>setNewM(p=>({...p,name:e.target.value}))} /></div>
          <div className="tf-form-group"><label className="tf-form-label">Model / Brand</label>
            <input className="tf-input" placeholder="e.g. Haas" value={newM.model} onChange={e=>setNewM(p=>({...p,model:e.target.value}))} /></div>
          <div className="tf-form-group"><label className="tf-form-label">Type</label>
            <select className="tf-select" value={newM.type} onChange={e=>setNewM(p=>({...p,type:e.target.value}))}>
              <option value="lathe">Lathe (turrets)</option><option value="mill">Mill (pockets)</option>
            </select></div>
          {newM.type==="lathe"?(<>
            <div className="tf-form-group"><label className="tf-form-label">Turrets</label>
              <input className="tf-input" type="number" min="1" max="6" value={newM.turrets} onChange={e=>setNewM(p=>({...p,turrets:parseInt(e.target.value)||1}))} /></div>
            <div className="tf-form-group"><label className="tf-form-label">Positions/Turret</label>
              <input className="tf-input" type="number" min="1" max="32" value={newM.positions} onChange={e=>setNewM(p=>({...p,positions:parseInt(e.target.value)||12}))} /></div>
          </>):(
            <div className="tf-form-group"><label className="tf-form-label">Tool Pockets</label>
              <input className="tf-input" type="number" min="1" max="300" value={newM.pockets} onChange={e=>setNewM(p=>({...p,pockets:parseInt(e.target.value)||40}))} /></div>
          )}
        </div>
        <button className="tf-btn green sm" onClick={add} disabled={!newM.name.trim()}>+ Add Machine</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {machines.map(m=>(
          <div key={m.id} className="tf-card" style={{padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                {editId===m.id?(
                  <input className="tf-input" style={{padding:"4px 8px",fontSize:14}} value={m.name} onChange={e=>rename(m.id,e.target.value)} onBlur={()=>setEditId(null)} autoFocus />
                ):(
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span className="tf-mono" style={{color:"var(--accent)",fontSize:13}}>{m.name}</span>
                    <button className="tf-btn ghost sm" style={{padding:"2px 6px",fontSize:10}} onClick={()=>setEditId(m.id)}>✏️</button>
                  </div>
                )}
                <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>{m.model} · {m.type==="lathe"?`${m.turrets}T×${m.positions}pos`:`${m.pockets}pockets`}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <div className="tf-toggle" onClick={()=>toggle(m.id)}><div className={"tf-toggle-switch"+(m.active?" on":"")} /></div>
                <button className="tf-btn danger sm" onClick={()=>remove(m.id)}>✕</button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(()=>loadSession());
  const[tab,setTab]=useState("operator");
  const[reports,setReports]=useState([]);
  const[loadingReports,setLoadingReports]=useState(true);
  const[machines,setMachines]=useState(DEFAULT_MACHINES);
  const[inventory,setInventory]=useState([]);

  const loadReports=useCallback(async()=>{setLoadingReports(true);const d=await fetchReports();setReports(d);setLoadingReports(false);},[]);
  const loadMachines=useCallback(async()=>{const d=await fetchMachinesDB();if(d&&d.length>0)setMachines(d);},[]);
  const loadInventory=useCallback(async()=>{const d=await fetchInventory();setInventory(d);},[]);

  useEffect(()=>{if(user){loadReports();loadMachines();loadInventory();}},[user]);

  if(!user)return<LoginScreen onLogin={u=>setUser(u)}/>;

  const lowStockCount=inventory.filter(i=>getStockStatus(i)!=="ok").length;

  const tabs=[
    {key:"operator",label:"📱 Operator"},
    {key:"crib",label:"🔧 Tool Crib"},
    {key:"inventory",label:"📦 Inventory",badge:lowStockCount},
    {key:"machines",label:"⚙️ Machines"},
    {key:"analytics",label:"📊 Analytics"},
    ...(user.isAdmin?[{key:"admin",label:"🔑 Admin",isAdmin:true}]:[]),
  ];

  return(
    <div className="tf-root">
      <nav className="tf-topnav">
        <div className="tf-logo">TOOL<span>FLOW</span></div>
        <div className="tf-nav-tabs">
          {tabs.map(t=>(
            <button key={t.key} className={"tf-nav-tab"+(tab===t.key?" active":"")+(t.isAdmin?" admin-tab":"")+(t.badge>0?" lowstock-alert":"")} onClick={()=>setTab(t.key)}>
              {t.label}{t.badge>0&&tab!==t.key?` (${t.badge})`:""}
            </button>
          ))}
        </div>
        <div className="tf-user-area">
          {user.isAdmin&&<span className="tf-admin-badge">⚙</span>}
          <div className="tf-user-badge">{user.name.split(" ")[0].toUpperCase()} · #{user.badge}</div>
          <button className="tf-logout-btn" onClick={()=>{clearSession();setUser(null);}}>Out</button>
        </div>
      </nav>
      <main className="tf-main">
        {tab==="operator"&&<OperatorView user={user} machines={machines} onReportAdded={loadReports} inventory={inventory}/>}
        {tab==="crib"&&<CribView reports={reports} loading={loadingReports} onRefresh={loadReports} inventory={inventory}/>}
        {tab==="inventory"&&<InventoryView inventory={inventory} onRefresh={loadInventory} user={user}/>}
        {tab==="machines"&&<MachineView machines={machines} inventory={inventory}/>}
        {tab==="analytics"&&<AnalyticsView reports={reports} inventory={inventory}/>}
        {tab==="admin"&&user.isAdmin&&<AdminView machines={machines} setMachines={setMachines} onSave={saveMachinesDB}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
